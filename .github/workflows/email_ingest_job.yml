name: Email ingest trigger

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  call-endpoint:
    runs-on: ubuntu-latest
    steps:
      - name: Call ingest endpoint
        env:
          INGEST_ENDPOINT_URL: ${{ secrets.HR_INGEST_ENDPOINT_URL || vars.HR_INGEST_ENDPOINT_URL }}
          RUN_TOKEN: ${{ secrets.HR_RUN_INGEST_TOKEN || vars.HR_RUN_INGEST_TOKEN }}
        run: |
          if [ -z "${INGEST_ENDPOINT_URL}" ]; then
            echo "::error title=Missing endpoint URL::Set HR_INGEST_ENDPOINT_URL in GitHub Secrets or Variables."
            exit 1
          fi

          if [ -n "${RUN_TOKEN}" ]; then
            curl --fail --show-error --silent \
              -H "X-Run-Token: ${RUN_TOKEN}" \
              "${INGEST_ENDPOINT_URL}"
          else
            curl --fail --show-error --silent "${INGEST_ENDPOINT_URL}"
          fi
