<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HR Job Applicants</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section id="authSection" class="container">
      <h1>HR Login</h1>
      <input id="loginEmail" type="email" placeholder="Email" />
      <input id="loginPassword" type="password" placeholder="Password" />
      <button id="loginBtn" type="button">Log In</button>
      <div id="changePasswordSection" hidden>
        <p>You must change your password.</p>
        <input id="newPassword" type="password" placeholder="New Password" />
        <button id="changePasswordBtn" type="button">Update Password</button>
      </div>
      <p id="authMessage"></p>
    </section>

    <main id="appSection" class="container" hidden>
      <header>
        <h1>Job Applicants</h1>
        <p>Search by name, date, and position.</p>
      </header>

      <section class="panel filters">
        <h2>Search</h2>
        <div class="filter-grid">
          <label>
            Name
            <input type="text" id="nameFilter" placeholder="e.g. Jane" />
          </label>
          <label class="date-filter">
            Submission Date
            <input type="text" id="dateRangeFilter" placeholder="Select start and end date" readonly />
            <input type="date" id="datePicker" class="date-picker-anchor" aria-hidden="true" tabindex="-1" />
          </label>
          <label>
            Job Title
            <select id="jobTitleFilter">
              <option value="">All job titles</option>
            </select>
          </label>
          <label>
            Status
            <select id="statusFilter">
              <option value="">All statuses</option>
            </select>
          </label>
        </div>
        <div class="actions">
          <button id="clearFiltersBtn" type="button">Reset Filters</button>
        </div>
      </section>

      <section class="panel">
        <h2>Applicants</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Submission Date</th>
                <th>Primary Position</th>
                <th>Other Positions</th>
                <th>Status</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Download PDF</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="applicantRows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
