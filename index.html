<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HR Job Applicants</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Job Applicants</h1>
        <p>Upload CSV submissions and search by name, date, and position.</p>
      </header>

      <section class="panel">
        <h2>CSV Ingest</h2>
        <input type="file" id="csvFile" accept=".csv,text/csv" />
        <button id="loadCsvBtn">Load CSV</button>
        <p id="ingestStatus" class="status"></p>
      </section>

      <section class="panel filters">
        <h2>Search</h2>
        <div class="filter-grid">
          <label>
            Name
            <input type="text" id="nameFilter" placeholder="e.g. Jane" />
          </label>
          <label>
            Submission Date (from)
            <input type="date" id="dateFromFilter" />
          </label>
          <label>
            Submission Date (to)
            <input type="date" id="dateToFilter" />
          </label>
          <label>
            Job Title
            <input type="text" id="jobTitleFilter" placeholder="e.g. Deputy Sheriff" />
          </label>
        </div>
        <div class="actions">
          <button id="clearFiltersBtn" type="button">Reset Filters</button>
        </div>
      </section>

      <section class="panel">
        <h2>Applicants</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Submission Date</th>
                <th>Primary Position</th>
                <th>Other Positions</th>
                <th>Email</th>
                <th>Phone</th>
              </tr>
            </thead>
            <tbody id="applicantRows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
